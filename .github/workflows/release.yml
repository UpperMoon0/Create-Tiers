name: Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Forge 1.20.1
        run: ./gradlew :forge-1.20.1:build

      - name: Build NeoForge 1.21.1
        run: ./gradlew :neoforge-1.21.1:build

      - name: Get version
        id: get_version
        run: |
          echo "version=$(grep 'mod_version' gradle.properties | cut -d'=' -f2 | xargs)" >> $GITHUB_OUTPUT

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: "Create: Tiers v${{ steps.get_version.outputs.version }}"
          draft: false
          prerelease: false
          files: |
            forge-1.20.1/build/libs/create-tiers-forge-1.20.1-${{ steps.get_version.outputs.version }}.jar
            neoforge-1.21.1/build/libs/create-tiers-neoforge-1.21.1-${{ steps.get_version.outputs.version }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
